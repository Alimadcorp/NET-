<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBNET NET 4 - Advanced Simulator</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #151f32;
            --border-color: #24344d;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.25);
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.15);
            --error: #f43f5e;
            --error-bg: rgba(244, 63, 94, 0.15);
            --accent-yellow: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 25px;
            margin-top: 20px;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        h1 { margin: 0; font-size: 1.6rem; color: #fff; font-weight: 700; letter-spacing: -0.5px; }
        
        .timer-badge {
            background: #1e293b;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 1.1rem;
            color: var(--accent-yellow);
        }

        /* Left Side: Quiz Workspace */
        .workspace {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 400px;
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .q-number { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); font-weight: 700; }
        
        .bookmark-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .bookmark-btn.active {
            border-color: var(--accent-yellow);
            color: var(--accent-yellow);
            background: rgba(245, 158, 11, 0.1);
        }

        .question-text { font-size: 1.25rem; line-height: 1.6; margin-bottom: 30px; color: #fff; }

        .options-grid { display: flex; flex-direction: column; gap: 14px; }

        .option-btn {
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #1e293b;
            text-align: left;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: #24344d;
            box-shadow: 0 0 12px var(--primary-glow);
        }

        /* Dynamic Feedback Engine Color Specifications */
        .option-btn.correct-state {
            background-color: var(--success-bg) !important;
            border-color: var(--success) !important;
            color: #fff !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        .option-btn.wrong-state {
            background-color: var(--error-bg) !important;
            border-color: var(--error) !important;
            color: #fff !important;
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.2);
        }

        /* Controls Block */
        .control-panel {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .nav-btn {
            background: #1e293b;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .nav-btn:hover:not(:disabled) { background: #24344d; border-color: var(--text-muted); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        .nav-btn.primary-action {
            background: var(--primary);
            border-color: var(--primary);
        }
        .nav-btn.primary-action:hover { background: #2563eb; box-shadow: 0 0 15px var(--primary-glow); }

        /* Right Side: Navigation Panel Dashboard */
        .sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-title { font-size: 1rem; font-weight: 600; margin: 0; color: #fff; }

        .matrix-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .matrix-cell {
            aspect-ratio: 1;
            background: #1e293b;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .matrix-cell:hover { border-color: var(--primary); color: #fff; }
        .matrix-cell.active { border-color: var(--primary); background: rgba(59, 130, 246, 0.1); color: var(--primary); box-shadow: inset 0 0 4px var(--primary-glow); }
        .matrix-cell.correct { background: var(--success-bg); border-color: var(--success); color: var(--success); }
        .matrix-cell.wrong { background: var(--error-bg); border-color: var(--error); color: var(--error); }
        .matrix-cell.bookmarked { border-color: var(--accent-yellow) !important; position: relative; }
        .matrix-cell.bookmarked::after {
            content: ''; position: absolute; top: 2px; right: 2px; 
            width: 6px; height: 6px; background: var(--accent-yellow); border-radius: 50%;
        }

        .stats-summary {
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.85rem;
        }

        #error-overlay {
            background: var(--error-bg);
            border: 1px solid var(--error);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            grid-column: 1 / -1;
        }
        
        .results-view { text-align: center; padding: 40px 10px; }
        .score-circle { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--primary); display: flex; align-items: center; justify-content: center; margin: 20px auto; font-size: 2rem; font-weight: 800; color: #fff; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body>

    <div class="container">
        <div id="error-overlay"></div>

        <header>
            <h1>CBNET NET 4 Simulator</h1>
            <div class="timer-badge" id="clock">00:00</div>
        </header>

        <main class="workspace" id="main-stage">
            <div>
                <div class="q-header">
                    <span class="q-number" id="q-meta-index">Question 1</span>
                    <button class="bookmark-btn" id="flag-btn" onclick="toggleBookmark()">Flag for Review</button>
                </div>
                <div class="question-text" id="q-body">Loading simulation data rows...</div>
                <div class="options-grid" id="options-box"></div>
            </div>

            <div class="control-panel">
                <button class="nav-btn" id="prev-btn" onclick="stepQuestion(-1)">&larr; Previous</button>
                <button class="nav-btn primary-action" id="next-btn" onclick="stepQuestion(1)">Next &rarr;</button>
            </div>
        </main>

        <aside class="sidebar">
            <h3 class="sidebar-title">Question Navigation Matrix</h3>
            <div class="matrix-grid" id="nav-matrix"></div>
            
            <div class="stats-summary">
                <div>Score: <strong id="stat-score" style="color:var(--success);">0</strong></div>
                <div>Progress: <strong id="stat-progress">0/0</strong></div>
            </div>
            <button class="nav-btn primary-action" style="width:100%; margin-top:10px;" onclick="terminateExam()">Submit Assessment</button>
        </aside>
    </div>

    <script>
        let dataset = [];
        let currentIndex = 0;
        let examTimer = null;
        let timeElapsed = 0;

        function parseCSVLine(line) {
            const separatorToken = "___LIT_COMMA___";
            const processedLine = line.replace(/\\,/g, separatorToken);
            const arrayTokens = processedLine.split(',');
            return arrayTokens.map(t => t.replace(new RegExp(separatorToken, 'g'), ',').trim());
        }

        async function initializeQuizRuntime() {
            try {
                const response = await fetch('data.csv');
                if (!response.ok) throw new Error("Could not find or locate standard 'data.csv' source.");
                
                const rawBuffer = await response.text();
                const lines = rawBuffer.split('\n').filter(l => l.trim() !== '');

                dataset = lines.map(line => {
                    const cleanTokens = parseCSVLine(line);
                    return {
                        question: cleanTokens[0],
                        options: [cleanTokens[1], cleanTokens[2], cleanTokens[3], cleanTokens[4]],
                        answer: cleanTokens[5],
                        selectedAnswer: null,
                        isCorrect: null,
                        bookmarked: false
                    };
                }).filter(entry => entry.question && entry.answer);

                if (dataset.length === 0) throw new Error("Parsed data array contains zero operational objects.");

                buildNavigationMatrix();
                renderQuestionWorkspace();
                startClock();
                
            } catch(ex) {
                const overlay = document.getElementById('error-overlay');
                overlay.style.display = "block";
                overlay.innerText = `Runtime Error Sequence: ${ex.message}`;
                document.getElementById('q-body').innerText = "Aborted processing structure loop.";
            }
        }

        function startClock() {
            examTimer = setInterval(() => {
                timeElapsed++;
                const mins = String(Math.floor(timeElapsed / 60)).padStart(2, '0');
                const secs = String(timeElapsed % 60).padStart(2, '0');
                document.getElementById('clock').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function buildNavigationMatrix() {
            const matrix = document.getElementById('nav-matrix');
            matrix.innerHTML = '';
            dataset.forEach((_, idx) => {
                const cell = document.createElement('div');
                cell.className = 'matrix-cell';
                cell.id = `cell-${idx}`;
                cell.innerText = idx + 1;
                cell.onclick = () => jumpToQuestion(idx);
                matrix.appendChild(cell);
            });
            updateStatsPanel();
        }

        function renderQuestionWorkspace() {
            if(currentIndex >= dataset.length || currentIndex < 0) return;
            
            const item = dataset[currentIndex];
            
            // Sync Control Mechanics
            document.getElementById('prev-btn').disabled = (currentIndex === 0);
            document.getElementById('next-btn').innerText = (currentIndex === dataset.length - 1) ? "Finish" : "Next \u2192";
            document.getElementById('q-meta-index').innerText = `Question ${currentIndex + 1}`;
            
            // Flag/Bookmark state representation
            const flagBtn = document.getElementById('flag-btn');
            if(item.bookmarked) flagBtn.classList.add('active');
            else flagBtn.classList.remove('active');

            // Render Core Target Components
            document.getElementById('q-body').innerText = item.question;
            const container = document.getElementById('options-box');
            container.innerHTML = '';

            item.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                
                // CRITICAL STRUCTURAL FIX: Preserve raw answer text separate from DOM text mutated by MathJax
                btn.setAttribute('data-raw', opt);

                if(item.selectedAnswer !== null) {
                    btn.disabled = true;
                    // Calculate visual highlights based on immutable raw state
                    if(opt === item.answer) btn.classList.add('correct-state');
                    if(opt === item.selectedAnswer && item.selectedAnswer !== item.answer) btn.classList.add('wrong-state');
                } else {
                    btn.onclick = () => selectOptionAction(btn, opt);
                }
                container.appendChild(btn);
            });

            // Re-render highlight references across Navigation Matrix
            document.querySelectorAll('.matrix-cell').forEach((c, i) => {
                c.classList.remove('active');
                if(i === currentIndex) c.classList.add('active');
            });

            // Trigger safe MathJax typesetting asynchronously on modifications
            if (window.MathJax && typeof window.MathJax.typesetPromise === "function") {
                MathJax.typesetPromise([document.getElementById('main-stage')]);
            }
        }

        function selectOptionAction(element, choice) {
            const item = dataset[currentIndex];
            item.selectedAnswer = choice;
            item.isCorrect = (choice === item.answer);

            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(b => {
                b.disabled = true;
                const rawVal = b.getAttribute('data-raw');
                if(rawVal === item.answer) b.classList.add('correct-state');
                if(rawVal === choice && choice !== item.answer) b.classList.add('wrong-state');
            });

            // Update Matrix Styles Syncing UI States
            const matrixCell = document.getElementById(`cell-${currentIndex}`);
            matrixCell.classList.add(item.isCorrect ? 'correct' : 'wrong');

            updateStatsPanel();
            
            if (window.MathJax && typeof window.MathJax.typesetPromise === "function") {
                MathJax.typesetPromise(Array.from(allButtons));
            }
        }

        function toggleBookmark() {
            const item = dataset[currentIndex];
            item.bookmarked = !item.bookmarked;
            
            const flagBtn = document.getElementById('flag-btn');
            const cell = document.getElementById(`cell-${currentIndex}`);
            
            if(item.bookmarked) {
                flagBtn.classList.add('active');
                cell.classList.add('bookmarked');
            } else {
                flagBtn.classList.remove('active');
                cell.classList.remove('bookmarked');
            }
        }

        function stepQuestion(direction) {
            if(direction === 1 && currentIndex === dataset.length - 1) {
                terminateExam();
                return;
            }
            currentIndex += direction;
            renderQuestionWorkspace();
        }

        function jumpToQuestion(index) {
            currentIndex = index;
            renderQuestionWorkspace();
        }

        function updateStatsPanel() {
            const correctCount = dataset.filter(q => q.isCorrect === true).length;
            const attemptedCount = dataset.filter(q => q.selectedAnswer !== null).length;
            
            document.getElementById('stat-score').innerText = correctCount;
            document.getElementById('stat-progress').innerText = `${attemptedCount}/${dataset.length}`;
        }

        function terminateExam() {
            clearInterval(examTimer);
            const score = dataset.filter(q => q.isCorrect === true).length;
            const percentage = Math.round((score / dataset.length) * 100);
            
            const mainStage = document.getElementById('main-stage');
            mainStage.innerHTML = `
                <div class="results-view">
                    <h2>Assessment Finalized</h2>
                    <div class="score-circle">${percentage}%</div>
                    <p style="color: var(--text-muted);">You resolved <strong>${score}</strong> correctly out of <strong>${dataset.length}</strong> total operational constraints.</p>
                    <button class="nav-btn primary-action" style="margin-top:20px;" onclick="window.location.reload()">Restart Engine Run</button>
                </div>
            `;
        }

        window.onload = initializeQuizRuntime;
    </script>
</body>
</html>
